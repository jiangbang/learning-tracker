name = "learning-tracker-api"
main = "src/index.ts"
compatibility_date = "2024-05-29"

# D1 Database
[[d1_databases]]
binding = "DB"
database_name = "learning-tracker-db"
database_id = "b18dca60-d1cc-4f06-888e-1df476e27883"

# 本地开发配置
[dev]
port = 8787

# 路由配置
[[routes]]
pattern = "api.keeprecord.shop/*"
zone_name = "keeprecord.shop"

# Google OAuth 环境变量（ secrets 会覆盖这些 ）
# 使用 `wrangler secret put GOOGLE_CLIENT_ID` 等命令设置实际值
[vars]
AUTH_CALLBACK_URL = "https://api.keeprecord.shop"
PAYPAL_CLIENT_ID = "ARWV59DyNWMBBVpt5r6ICDTbxhzgKtEl78LLXksmgFa42tfH0r0jDYb0Yv1G58bHMq4VbzksTsnd1Uqe"
